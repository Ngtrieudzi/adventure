<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anime Gacha - Spirit Wars</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        #gameContainer {
            background: #111827;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid #2a3a6a;
            max-width: 1000px;
            width: 100%;
        }
        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #c8d8ff;
            padding: 8px 16px;
            background: #1a2540;
            border-radius: 40px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        #topBar .stat {
            background: #0f172a;
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #2f4a7a;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #topBar .stat span { color: #ffd966; }
        #mainUI {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #cityView {
            background: #1b2538;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #2a3a5a;
            min-height: 200px;
            background-image: radial-gradient(circle at 20% 30%, #2a3a6a 0%, #0f172a 80%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #cityTitle {
            font-size: 28px;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 20px #ffaa44;
            letter-spacing: 4px;
        }
        #citySub {
            color: #aabbdd;
            font-size: 16px;
            margin-top: 4px;
        }
        #menuGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .menuBtn {
            background: #1f2a4a;
            border: 2px solid #2f4a7a;
            border-radius: 20px;
            padding: 14px 8px;
            color: #c8d8ff;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            box-shadow: 0 4px 0 #0a1220;
        }
        .menuBtn:hover { background: #2a3a6a; transform: translateY(-2px); box-shadow: 0 6px 0 #0a1220; }
        .menuBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 #0a1220; }
        .menuBtn .icon { font-size: 28px; display: block; margin-bottom: 2px; }

        #contentArea {
            background: #0f172a;
            border-radius: 24px;
            padding: 16px;
            min-height: 320px;
            border: 1px solid #1f2a4a;
            margin-top: 4px;
            position: relative;
        }
        #contentArea h3 {
            color: #ffd966;
            margin-bottom: 12px;
            font-size: 20px;
            border-bottom: 1px solid #2a3a5a;
            padding-bottom: 8px;
        }

        /* Gacha */
        #gachaPanel { display: none; }
        #gachaPanel.active { display: block; }
        .gachaBtn {
            background: #4a2a6a;
            border: none;
            color: white;
            padding: 14px 30px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a0a2a;
            transition: all 0.1s;
            margin: 8px;
        }
        .gachaBtn:active { transform: translateY(6px); box-shadow: 0 1px 0 #1a0a2a; }
        .gachaBtn:disabled { opacity: 0.4; transform: translateY(4px); box-shadow: 0 2px 0 #1a0a2a; }
        .heroCard {
            display: inline-block;
            background: #1a2540;
            border-radius: 16px;
            padding: 12px;
            margin: 8px;
            border: 2px solid #2f4a7a;
            width: 140px;
            text-align: center;
            transition: all 0.3s;
        }
        .heroCard.rare { border-color: #4a8aff; background: #1a2a5a; }
        .heroCard.epic { border-color: #aa66ff; background: #2a1a5a; }
        .heroCard.legend { border-color: #ffaa44; background: #3a2a1a; box-shadow: 0 0 30px #ffaa44; }
        .heroCard .avatar { font-size: 48px; display: block; margin: 4px 0; }
        .heroCard .hName { font-weight: bold; color: #fff; }
        .heroCard .hStats { font-size: 12px; color: #aabbdd; }
        .heroCard .upgradeBtn {
            background: #2a6a4a;
            border: none;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            margin-top: 6px;
            cursor: pointer;
        }

        /* Combat */
        #combatPanel { display: none; }
        #combatPanel.active { display: block; }
        #battleCanvas {
            width: 100%;
            height: 300px;
            background: #0a1220;
            border-radius: 16px;
            border: 1px solid #2a3a5a;
            cursor: pointer;
        }

        /* Backpack */
        #backpackPanel { display: none; }
        #backpackPanel.active { display: block; }
        .heroGrid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }

        /* Campaign */
        #campaignPanel { display: none; }
        #campaignPanel.active { display: block; }
        .campaignStage {
            background: #1a2540;
            border-radius: 16px;
            padding: 12px 20px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid #4a8aff;
        }

        /* Adventure */
        #adventurePanel { display: none; }
        #adventurePanel.active { display: block; }

        /* Floating animation */
        .floatText {
            position: absolute;
            font-weight: bold;
            font-size: 24px;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 1.2s forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }

        @media (max-width: 600px) {
            #menuGrid { grid-template-columns: repeat(2, 1fr); }
            .heroCard { width: 100px; }
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="topBar">
        <div class="stat">⭐ <span id="gemsDisplay">100</span></div>
        <div class="stat">💰 <span id="goldDisplay">500</span></div>
        <div class="stat">🏆 <span id="winDisplay">0</span></div>
        <div style="font-size:14px; color:#8899bb;">Lv.<span id="playerLevel">1</span></div>
    </div>
    <div id="mainUI">
        <div id="cityView">
            <div id="cityTitle">🏯 Main City</div>
            <div id="citySub">Aeria - Cây Thế Giới</div>
            <div style="display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; justify-content:center;">
                <span style="background:#1a2a4a; padding:4px 16px; border-radius:30px;">⚔️ <span id="heroCount">0</span> tướng</span>
                <span style="background:#1a2a4a; padding:4px 16px; border-radius:30px;">📊 <span id="totalPower">0</span> sức mạnh</span>
            </div>
        </div>
        <div id="menuGrid">
            <div class="menuBtn" data-tab="hero">⚔️<br>Hero</div>
            <div class="menuBtn" data-tab="campaign">📜<br>Campaign</div>
            <div class="menuBtn" data-tab="backpack">🎒<br>Backpack</div>
            <div class="menuBtn" data-tab="adventure">🌋<br>Adventure</div>
        </div>
        <div id="contentArea">
            <!-- Hero Panel -->
            <div id="heroPanel" class="active">
                <h3>⚔️ Đội hình của bạn</h3>
                <div id="heroList" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center;"></div>
                <div style="text-align:center; margin-top:16px;">
                    <button class="gachaBtn" id="gacha1Btn">🎲 Gacha 1x (50 gems)</button>
                    <button class="gachaBtn" id="gacha10Btn">🎰 Gacha 10x (450 gems)</button>
                </div>
                <div id="gachaResult" style="margin-top:16px; min-height:60px; text-align:center; color:#aabbdd;"></div>
            </div>
            <!-- Campaign Panel -->
            <div id="campaignPanel">
                <h3>📜 Chiến dịch</h3>
                <div id="campaignList"></div>
            </div>
            <!-- Backpack Panel -->
            <div id="backpackPanel">
                <h3>🎒 Túi đồ</h3>
                <div id="backpackList" class="heroGrid"></div>
            </div>
            <!-- Adventure Panel -->
            <div id="adventurePanel">
                <h3>🌋 Phiêu lưu</h3>
                <canvas id="battleCanvas" width="900" height="300"></canvas>
                <div style="display:flex; justify-content:space-between; margin-top:10px; color:#aabbdd;">
                    <span>⚔️ <span id="battleStatus">Sẵn sàng</span></span>
                    <button id="adventureBtn" style="background:#6a3a8a; border:none; color:white; padding:8px 30px; border-radius:40px; font-weight:bold; cursor:pointer;">⚔️ Tấn công</button>
                </div>
                <div id="battleLog" style="margin-top:8px; background:#0a1220; border-radius:12px; padding:8px; max-height:80px; overflow-y:auto; color:#88ccff; font-size:13px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    //  GAME STATE
    // ============================================================
    const state = {
        gems: 100,
        gold: 500,
        wins: 0,
        playerLevel: 1,
        heroes: [],          // { id, name, rarity, atk, def, hp, maxHp, level, exp, avatar, type, element }
        inventory: [],       // item objects
        currentTab: 'hero',
        battle: {
            enemy: null,
            playerTeam: [],
            turn: 0,
            log: [],
            animating: false,
        }
    };

    // ============================================================
    //  HERO TEMPLATES (Anime style)
    // ============================================================
    const HERO_TEMPLATES = [
        { id: 'kirito', name: 'Kirito', rarity: 'legend', avatar: '⚔️', atk: 28, def: 14, hp: 110, element: 'dark', type: 'swordsman' },
        { id: 'asuna', name: 'Asuna', rarity: 'epic', avatar: '🌸', atk: 24, def: 12, hp: 95, element: 'light', type: 'rapier' },
        { id: 'naruto', name: 'Naruto', rarity: 'epic', avatar: '🍥', atk: 22, def: 10, hp: 120, element: 'wind', type: 'ninja' },
        { id: 'sasuke', name: 'Sasuke', rarity: 'legend', avatar: '🌀', atk: 30, def: 10, hp: 100, element: 'fire', type: 'shinobi' },
        { id: 'sakura', name: 'Sakura', rarity: 'rare', avatar: '💮', atk: 16, def: 18, hp: 90, element: 'earth', type: 'healer' },
        { id: 'goku', name: 'Goku', rarity: 'legend', avatar: '🐉', atk: 35, def: 8, hp: 140, element: 'fire', type: 'saiyan' },
        { id: 'luffy', name: 'Luffy', rarity: 'epic', avatar: '🏴‍☠️', atk: 26, def: 12, hp: 130, element: 'water', type: 'pirate' },
        { id: 'nami', name: 'Nami', rarity: 'rare', avatar: '🍊', atk: 18, def: 8, hp: 75, element: 'lightning', type: 'navigator' },
        { id: 'zoro', name: 'Zoro', rarity: 'epic', avatar: '🗡️', atk: 28, def: 10, hp: 115, element: 'wind', type: 'swordsman' },
        { id: 'tanjiro', name: 'Tanjiro', rarity: 'epic', avatar: '🔥', atk: 24, def: 14, hp: 105, element: 'fire', type: 'demon slayer' },
        { id: 'nezuko', name: 'Nezuko', rarity: 'rare', avatar: '🎀', atk: 20, def: 12, hp: 95, element: 'dark', type: 'demon' },
        { id: 'gojo', name: 'Gojo', rarity: 'legend', avatar: '👁️', atk: 32, def: 16, hp: 125, element: 'light', type: 'sorcerer' },
        { id: 'itadori', name: 'Itadori', rarity: 'rare', avatar: '👊', atk: 22, def: 10, hp: 110, element: 'fire', type: 'martial artist' },
        { id: 'megumi', name: 'Megumi', rarity: 'rare', avatar: '🐕', atk: 18, def: 14, hp: 90, element: 'earth', type: 'summoner' },
        { id: 'eren', name: 'Eren', rarity: 'epic', avatar: '⚡', atk: 26, def: 12, hp: 125, element: 'wind', type: 'titan' },
        { id: 'mikasa', name: 'Mikasa', rarity: 'rare', avatar: '🪶', atk: 24, def: 10, hp: 100, element: 'wind', type: 'soldier' },
        { id: 'levi', name: 'Levi', rarity: 'legend', avatar: '⚔️', atk: 34, def: 12, hp: 110, element: 'dark', type: 'captain' },
        { id: 'asta', name: 'Asta', rarity: 'epic', avatar: '📖', atk: 28, def: 8, hp: 115, element: 'light', type: 'mage' },
        { id: 'yuno', name: 'Yuno', rarity: 'rare', avatar: '🍃', atk: 20, def: 12, hp: 90, element: 'wind', type: 'mage' },
        { id: 'bell', name: 'Bell', rarity: 'rare', avatar: '🗡️', atk: 18, def: 10, hp: 80, element: 'light', type: 'adventurer' },
    ];

    // Rarity colors
    const RARITY_COLORS = {
        common: '#aabbdd',
        rare: '#4a8aff',
        epic: '#aa66ff',
        legend: '#ffaa44'
    };
    const RARITY_ORDER = ['common','rare','epic','legend'];

    // ============================================================
    //  UTILITY
    // ============================================================
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function randInt(min, max) { return Math.floor(rand(min, max+1)); }
    function pick(arr) { return arr[randInt(0, arr.length-1)]; }

    function generateHero() {
        // weighted rarity
        const r = Math.random();
        let rarity;
        if (r < 0.05) rarity = 'legend';
        else if (r < 0.20) rarity = 'epic';
        else if (r < 0.55) rarity = 'rare';
        else rarity = 'common';

        // pick template matching rarity (or higher if not enough)
        let pool = HERO_TEMPLATES.filter(h => h.rarity === rarity);
        if (pool.length === 0) pool = HERO_TEMPLATES.filter(h => h.rarity === 'rare');
        if (pool.length === 0) pool = HERO_TEMPLATES;

        const template = pick(pool);
        // scale stats based on rarity
        const rarityMult = { common: 0.7, rare: 1.0, epic: 1.4, legend: 2.0 };
        const mult = rarityMult[rarity] || 1.0;
        return {
            ...template,
            rarity: rarity,
            atk: Math.floor(template.atk * mult * (0.9 + rand(0,0.2))),
            def: Math.floor(template.def * mult * (0.9 + rand(0,0.2))),
            hp: Math.floor(template.hp * mult * (0.9 + rand(0,0.2))),
            maxHp: Math.floor(template.hp * mult * (0.9 + rand(0,0.2))),
            level: 1,
            exp: 0,
            expNext: 20,
        };
    }

    // ============================================================
    //  UI UPDATE
    // ============================================================
    function updateUI() {
        document.getElementById('gemsDisplay').textContent = state.gems;
        document.getElementById('goldDisplay').textContent = state.gold;
        document.getElementById('winDisplay').textContent = state.wins;
        document.getElementById('playerLevel').textContent = state.playerLevel;
        document.getElementById('heroCount').textContent = state.heroes.length;
        const power = state.heroes.reduce((sum, h) => sum + h.atk + h.def + Math.floor(h.hp/5), 0);
        document.getElementById('totalPower').textContent = power;
        renderHeroList();
        renderBackpack();
        renderCampaign();
        updateBattleUI();
    }

    function renderHeroList() {
        const container = document.getElementById('heroList');
        if (state.heroes.length === 0) {
            container.innerHTML = '<div style="color:#8899bb; padding:20px;">Bạn chưa có tướng. Hãy Gacha!</div>';
            return;
        }
        container.innerHTML = state.heroes.map((h, idx) => `
            <div class="heroCard ${h.rarity}">
                <span class="avatar">${h.avatar}</span>
                <div class="hName">${h.name}</div>
                <div class="hStats">⚔️${h.atk} 🛡️${h.def} ❤️${h.hp}</div>
                <div class="hStats">Lv.${h.level} ${h.element} ${h.type}</div>
                <button class="upgradeBtn" data-idx="${idx}">⬆ Nâng cấp (${Math.floor(h.level * 15)}g)</button>
            </div>
        `).join('');
        // upgrade buttons
        container.querySelectorAll('.upgradeBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                upgradeHero(idx);
            });
        });
    }

    function renderBackpack() {
        const container = document.getElementById('backpackList');
        if (state.heroes.length === 0) {
            container.innerHTML = '<div style="color:#8899bb; padding:20px;">Chưa có tướng nào.</div>';
            return;
        }
        container.innerHTML = state.heroes.map(h => `
            <div class="heroCard ${h.rarity}">
                <span class="avatar">${h.avatar}</span>
                <div class="hName">${h.name}</div>
                <div class="hStats">${h.rarity.toUpperCase()} | ${h.element}</div>
            </div>
        `).join('');
    }

    function renderCampaign() {
        const container = document.getElementById('campaignList');
        const stages = [
            { name: 'Rừng Bóng Tối', power: 50, reward: 20 },
            { name: 'Đền Cổ', power: 100, reward: 40 },
            { name: 'Núi Lửa', power: 200, reward: 70 },
            { name: 'Thành Cổ', power: 350, reward: 110 },
            { name: 'Cây Thế Giới', power: 500, reward: 160 },
        ];
        const totalPower = state.heroes.reduce((s,h) => s + h.atk + h.def + Math.floor(h.hp/5), 0);
        container.innerHTML = stages.map((s, i) => `
            <div class="campaignStage">
                <span>${i+1}. ${s.name} (⚔️${s.power})</span>
                <span>
                    🎁 ${s.reward} gems
                    <button class="campaignBtn" data-idx="${i}" ${totalPower < s.power ? 'disabled style="opacity:0.4;"' : ''}>
                        ${totalPower >= s.power ? '✅ Chiến đấu' : '🔒 Khóa'}
                    </button>
                </span>
            </div>
        `).join('');
        container.querySelectorAll('.campaignBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                startCampaign(idx);
            });
        });
    }

    function updateBattleUI() {
        const status = document.getElementById('battleStatus');
        if (state.battle.animating) status.textContent = '⚔️ Đang chiến đấu...';
        else if (state.battle.enemy) status.textContent = '👹 Đối thủ xuất hiện!';
        else status.textContent = '🟢 Sẵn sàng';
    }

    // ============================================================
    //  GACHA
    // ============================================================
    function doGacha(count) {
        const cost = count === 1 ? 50 : 450;
        if (state.gems < cost) {
            document.getElementById('gachaResult').innerHTML = '❌ Không đủ gem!';
            return;
        }
        state.gems -= cost;
        const results = [];
        for (let i=0; i<count; i++) {
            const hero = generateHero();
            state.heroes.push(hero);
            results.push(hero);
        }
        // show result
        const names = results.map(h => `<span style="color:${RARITY_COLORS[h.rarity]}">${h.avatar} ${h.name} (${h.rarity})</span>`).join(', ');
        document.getElementById('gachaResult').innerHTML = `🎉 Nhận được: ${names}`;
        // floating effect
        addFloatingText('🎉 +' + count + ' tướng!', 200, 100);
        updateUI();
    }

    // ============================================================
    //  UPGRADE HERO
    // ============================================================
    function upgradeHero(idx) {
        const h = state.heroes[idx];
        if (!h) return;
        const cost = Math.floor(h.level * 15);
        if (state.gold < cost) {
            addFloatingText('❌ Không đủ vàng!', 300, 150);
            return;
        }
        state.gold -= cost;
        h.level++;
        h.atk += Math.floor(2 + h.level * 0.5);
        h.def += Math.floor(1 + h.level * 0.4);
        h.hp += Math.floor(4 + h.level * 0.8);
        h.maxHp = h.hp;
        addFloatingText(`⬆ ${h.name} Lv.${h.level}`, 200, 100, '#66ff88');
        updateUI();
    }

    // ============================================================
    //  CAMPAIGN
    // ============================================================
    function startCampaign(idx) {
        const stages = [
            { name: 'Rừng Bóng Tối', power: 50, reward: 20 },
            { name: 'Đền Cổ', power: 100, reward: 40 },
            { name: 'Núi Lửa', power: 200, reward: 70 },
            { name: 'Thành Cổ', power: 350, reward: 110 },
            { name: 'Cây Thế Giới', power: 500, reward: 160 },
        ];
        const stage = stages[idx];
        const totalPower = state.heroes.reduce((s,h) => s + h.atk + h.def + Math.floor(h.hp/5), 0);
        if (totalPower < stage.power) {
            addFloatingText('❌ Sức mạnh không đủ!', 300, 150);
            return;
        }
        // reward
        state.gems += stage.reward;
        state.gold += stage.reward * 2;
        state.wins++;
        state.playerLevel = Math.floor(state.wins / 3) + 1;
        addFloatingText(`🏆 Thắng ${stage.name}! +${stage.reward} gems`, 200, 80, '#ffd700');
        // random hero drop 10%
        if (Math.random() < 0.15) {
            const hero = generateHero();
            state.heroes.push(hero);
            addFloatingText(`🎉 Nhận được ${hero.name}!`, 200, 140, '#ff88ff');
        }
        updateUI();
    }

    // ============================================================
    //  BATTLE / ADVENTURE (with anime-style animation on canvas)
    // ============================================================
    const battleCanvas = document.getElementById('battleCanvas');
    const ctx = battleCanvas.getContext('2d');
    let battleAnimId = null;

    function startAdventure() {
        if (state.heroes.length === 0) {
            addFloatingText('❌ Cần ít nhất 1 tướng!', 300, 150);
            return;
        }
        if (state.battle.animating) return;
        // pick random enemy
        const enemyTemplates = [
            { name: 'Goblin', avatar: '👺', atk: 10, def: 4, hp: 40, color: '#4caf50' },
            { name: 'Skeleton', avatar: '💀', atk: 14, def: 6, hp: 55, color: '#b0b0b0' },
            { name: 'Shadow', avatar: '👻', atk: 18, def: 8, hp: 70, color: '#7b4a9e' },
            { name: 'Boss', avatar: '🐲', atk: 25, def: 12, hp: 120, color: '#c0392b' },
        ];
        const enemy = { ...pick(enemyTemplates), maxHp: 0 };
        enemy.maxHp = enemy.hp;
        state.battle.enemy = enemy;
        state.battle.playerTeam = state.heroes.slice(0, 3); // first 3 heroes
        state.battle.turn = 0;
        state.battle.log = [];
        state.battle.animating = true;
        document.getElementById('battleStatus').textContent = '⚔️ Đang chiến đấu...';
        document.getElementById('adventureBtn').disabled = true;

        // start battle loop
        if (battleAnimId) cancelAnimationFrame(battleAnimId);
        battleLoop();
    }

    function battleLoop() {
        if (!state.battle.animating) return;
        // simulate turn
        const enemy = state.battle.enemy;
        const team = state.battle.playerTeam;
        if (!enemy || enemy.hp <= 0) {
            // victory
            state.battle.animating = false;
            document.getElementById('battleStatus').textContent = '🏆 Chiến thắng!';
            document.getElementById('adventureBtn').disabled = false;
            const reward = 20 + state.heroes.length * 5;
            state.gold += reward;
            state.gems += Math.floor(reward / 2);
            state.wins++;
            state.playerLevel = Math.floor(state.wins / 3) + 1;
            addFloatingText(`🎉 Thắng! +${reward}g`, 200, 80, '#ffd700');
            updateUI();
            drawBattleScene('win');
            return;
        }
        if (team.every(h => h.hp <= 0)) {
            // defeat
            state.battle.animating = false;
            document.getElementById('battleStatus').textContent = '💀 Thất bại...';
            document.getElementById('adventureBtn').disabled = false;
            addFloatingText('💀 Thua trận!', 300, 150, '#ff3333');
            drawBattleScene('lose');
            return;
        }

        // --- player attack ---
        const attacker = team.find(h => h.hp > 0);
        if (attacker) {
            const dmg = Math.max(1, attacker.atk - enemy.def + randInt(-2, 5));
            enemy.hp -= dmg;
            state.battle.log.push(`${attacker.name} gây ${dmg} sát thương!`);
            addFloatingText(`-${dmg}`, 500 + rand(-30,30), 100 + rand(-20,20), '#ff8844');
            // animation effect
            drawBattleScene('attack', attacker, enemy);
        }

        // enemy counter-attack if alive
        if (enemy.hp > 0) {
            const target = team.find(h => h.hp > 0);
            if (target) {
                const dmg = Math.max(1, enemy.atk - target.def + randInt(-2, 4));
                target.hp -= dmg;
                state.battle.log.push(`${enemy.name} gây ${dmg} sát thương lên ${target.name}!`);
                addFloatingText(`-${dmg}`, 200 + rand(-20,20), 100 + rand(-20,20), '#ff3333');
                drawBattleScene('counter', target, enemy);
            }
        }

        // update log
        const logDiv = document.getElementById('battleLog');
        logDiv.innerHTML = state.battle.log.slice(-5).map(s => '⚔️ ' + s).join('<br>');
        logDiv.scrollTop = logDiv.scrollHeight;

        // next turn after delay
        setTimeout(() => {
            if (state.battle.animating) battleLoop();
        }, 600);
    }

    // ============================================================
    //  DRAW BATTLE SCENE (Anime style)
    // ============================================================
    function drawBattleScene(mode, attacker, enemy) {
        const W = battleCanvas.width, H = battleCanvas.height;
        ctx.clearRect(0, 0, W, H);
        // background
        ctx.fillStyle = '#0a1220';
        ctx.fillRect(0, 0, W, H);
        // stars
        for (let i=0; i<40; i++) {
            ctx.fillStyle = `rgba(255,255,255,${0.2+Math.random()*0.5})`;
            ctx.beginPath();
            ctx.arc(rand(10,W-10), rand(10,H-10), 1+rand(0,2), 0, Math.PI*2);
            ctx.fill();
        }

        // draw enemy (right side)
        const e = state.battle.enemy;
        if (e) {
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 30;
            ctx.font = '60px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText(e.avatar, W-120, 100);
            ctx.shadowBlur = 0;
            ctx.font = '16px sans-serif';
            ctx.fillStyle = '#ffdddd';
            ctx.fillText(e.name + ' ❤️' + Math.max(0,e.hp), W-120, 130);
            // hp bar
            ctx.fillStyle = '#333';
            ctx.fillRect(W-200, 140, 120, 12);
            const hpPct = Math.max(0, e.hp / e.maxHp);
            ctx.fillStyle = hpPct > 0.5 ? '#4caf50' : (hpPct > 0.25 ? '#ffaa44' : '#f44336');
            ctx.fillRect(W-200, 140, 120 * hpPct, 12);
        }

        // draw player team (left side)
        const team = state.battle.playerTeam;
        if (team) {
            team.forEach((h, i) => {
                if (h.hp <= 0) return;
                const x = 60 + i * 100;
                const y = 70 + i * 20;
                ctx.shadowColor = '#4488ff';
                ctx.shadowBlur = 20;
                ctx.font = '40px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.fillText(h.avatar, x, y+20);
                ctx.shadowBlur = 0;
                ctx.font = '12px sans-serif';
                ctx.fillStyle = '#88ddff';
                ctx.fillText(h.name + ' ❤️' + h.hp, x, y+40);
            });
        }

        // attack effects
        if (mode === 'attack' && attacker) {
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ffaa44';
            ctx.font = '50px sans-serif';
            ctx.fillStyle = '#ffdd44';
            ctx.fillText('⚡', W/2 + rand(-40,40), 100);
            ctx.shadowBlur = 0;
        }
        if (mode === 'counter' && enemy) {
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ff3333';
            ctx.font = '50px sans-serif';
            ctx.fillStyle = '#ff4444';
            ctx.fillText('💥', W/2 + rand(-40,40), 140);
            ctx.shadowBlur = 0;
        }
        if (mode === 'win') {
            ctx.font = '48px sans-serif';
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffaa00';
            ctx.shadowBlur = 40;
            ctx.fillText('🏆 VICTORY!', W/2, 180);
            ctx.shadowBlur = 0;
        }
        if (mode === 'lose') {
            ctx.font = '48px sans-serif';
            ctx.fillStyle = '#ff3333';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 40;
            ctx.fillText('💀 DEFEAT', W/2, 180);
            ctx.shadowBlur = 0;
        }
    }

    // ============================================================
    //  FLOATING TEXT (visual feedback)
    // ============================================================
    function addFloatingText(text, x, y, color = '#ffd700') {
        const el = document.createElement('div');
        el.className = 'floatText';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        document.getElementById('contentArea').appendChild(el);
        setTimeout(() => el.remove(), 1200);
    }

    // ============================================================
    //  TAB SWITCHING
    // ============================================================
    function switchTab(tab) {
        state.currentTab = tab;
        document.querySelectorAll('#contentArea > div').forEach(el => el.classList.remove('active'));
        document.getElementById(tab + 'Panel').classList.add('active');
        // update content
        if (tab === 'hero') renderHeroList();
        if (tab === 'backpack') renderBackpack();
        if (tab === 'campaign') renderCampaign();
        if (tab === 'adventure') {
            drawBattleScene('idle');
            updateBattleUI();
        }
    }

    // ============================================================
    //  INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        // tab buttons
        document.querySelectorAll('.menuBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                switchTab(tab);
            });
        });

        // gacha buttons
        document.getElementById('gacha1Btn').addEventListener('click', () => doGacha(1));
        document.getElementById('gacha10Btn').addEventListener('click', () => doGacha(10));

        // adventure
        document.getElementById('adventureBtn').addEventListener('click', startAdventure);

        // initial state: give 2 starter heroes
        for (let i=0; i<2; i++) {
            const h = generateHero();
            h.rarity = 'rare';
            state.heroes.push(h);
        }
        updateUI();
        switchTab('hero');

        // draw initial battle canvas
        drawBattleScene('idle');
    });

    // canvas resize handler
    function resizeCanvas() {
        const rect = battleCanvas.getBoundingClientRect();
        // keep aspect ratio
        battleCanvas.width = rect.width * (900 / rect.width);
        battleCanvas.height = rect.width * (300 / 900);
        drawBattleScene('idle');
    }
    window.addEventListener('resize', resizeCanvas);
</script>
</body>
