<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spirit Wars 2D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0f1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
        #gameContainer { background: #141c2b; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #2a3a55; }
        canvas { display: block; width: 900px; height: 600px; border-radius: 16px; background: #1b2538; cursor: pointer; box-shadow: inset 0 0 50px rgba(0,0,0,0.6); }
        #ui { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; color: #b8d0e8; font-weight: bold; text-shadow: 0 2px 4px #000; }
        .stat { background: #0f172a; padding: 8px 18px; border-radius: 30px; border: 1px solid #2f4a6b; font-size: 16px; display: flex; align-items: center; gap: 12px; }
        .stat span { color: #ffd966; }
        button { background: #2a4a6a; border: none; color: white; padding: 8px 24px; border-radius: 40px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; border: 1px solid #4a7a9a; box-shadow: 0 4px 0 #0a1a2a; }
        button:hover { background: #3a6a8a; transform: translateY(-2px); box-shadow: 0 6px 0 #0a1a2a; }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 #0a1a2a; }
        #resetBtn { background: #4a2a3a; border-color: #7a4a5a; }
        #resetBtn:hover { background: #6a3a4a; }
        @media (max-width: 920px) { canvas { width: 100%; height: auto; aspect-ratio: 3/2; } #gameContainer { padding: 10px; width: 98vw; } }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="ui">
        <div class="stat">❤️ HP: <span id="hpDisplay">100</span></div>
        <div class="stat">⚔️ ATK: <span id="atkDisplay">12</span></div>
        <div class="stat">🛡️ DEF: <span id="defDisplay">5</span></div>
        <div class="stat">💰 Gold: <span id="goldDisplay">0</span></div>
        <button id="resetBtn">↺ Restart</button>
    </div>
</div>
<script>
    (function(){
        // ========== CONFIG ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 900, H = 600;

        // UI elements
        const hpSpan = document.getElementById('hpDisplay');
        const atkSpan = document.getElementById('atkDisplay');
        const defSpan = document.getElementById('defDisplay');
        const goldSpan = document.getElementById('goldDisplay');

        // ========== GAME STATE ==========
        let game = {
            player: { x: 400, y: 480, w: 40, h: 50, hp: 100, maxHp: 100, atk: 12, def: 5, baseAtk: 12, baseDef: 5, level: 1, exp: 0, expNext: 30, gold: 0 },
            enemies: [],
            projectiles: [],
            particles: [],
            enemySpawnTimer: 0,
            enemySpawnInterval: 70, // frames
            maxEnemies: 6,
            frame: 0,
            gameOver: false,
            win: false,
            bossActive: false,
            bossSpawned: false,
            bossDefeated: false,
            clickCooldown: 0,
            // floating texts
            floatingTexts: []
        };

        // ========== UTILITY ==========
        function rand(min, max) { return Math.random() * (max - min) + min; }
        function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

        // ========== ENEMY FACTORY ==========
        function createEnemy(type, x, y) {
            const base = {
                x: x || rand(60, W-60),
                y: y || rand(60, 300),
                w: 36, h: 42,
                speed: 1.2 + Math.random() * 0.8,
                type: type || 'goblin',
                state: 'idle',
                attackCooldown: 0,
                hitFlash: 0
            };
            switch(base.type) {
                case 'goblin':
                    return { ...base, hp: 30, maxHp: 30, atk: 8, def: 2, exp: 12, gold: 5, color: '#4caf50', speed: 1.6 };
                case 'skeleton':
                    return { ...base, hp: 45, maxHp: 45, atk: 12, def: 3, exp: 18, gold: 8, color: '#b0b0b0', speed: 1.2 };
                case 'shadow':
                    return { ...base, hp: 60, maxHp: 60, atk: 15, def: 5, exp: 25, gold: 12, color: '#7b4a9e', speed: 1.0 };
                case 'boss':
                    return { ...base, hp: 200, maxHp: 200, atk: 22, def: 8, exp: 80, gold: 50, color: '#c0392b', speed: 0.8, w: 64, h: 72, type: 'boss' };
                default:
                    return { ...base, hp: 30, maxHp: 30, atk: 8, def: 2, exp: 12, gold: 5, color: '#4caf50', speed: 1.6 };
            }
        }

        // ========== SPAWN ENEMY ==========
        function spawnEnemy() {
            if (game.gameOver || game.win) return;
            if (game.bossActive && game.enemies.length >= 1) return; // boss fight: only boss
            if (game.enemies.length >= game.maxEnemies) return;

            let type = 'goblin';
            const r = Math.random();
            if (game.bossSpawned && !game.bossDefeated) {
                // boss already spawned, don't spawn more
                return;
            }
            // progressive difficulty
            const lvl = game.player.level;
            if (lvl >= 5 && r < 0.25) type = 'shadow';
            else if (lvl >= 3 && r < 0.45) type = 'skeleton';
            else type = 'goblin';

            // boss spawn condition: every 5 levels, but only if not already spawned
            if (lvl % 5 === 0 && lvl > 0 && !game.bossSpawned && !game.bossDefeated && !game.bossActive) {
                type = 'boss';
                game.bossSpawned = true;
                game.bossActive = true;
                // spawn boss at center top
                const boss = createEnemy('boss', W/2 - 32, 60);
                game.enemies.push(boss);
                addFloatingText('👹 BOSS APPEARS!', W/2-80, 120, '#ff4444', 40);
                return;
            }

            const enemy = createEnemy(type, rand(50, W-50), rand(40, 250));
            game.enemies.push(enemy);
        }

        // ========== PROJECTILE ==========
        function shootProjectile(targetX, targetY) {
            if (game.gameOver || game.win) return;
            const p = game.player;
            const angle = Math.atan2(targetY - (p.y + p.h/2), targetX - (p.x + p.w/2));
            const speed = 7;
            const proj = {
                x: p.x + p.w/2,
                y: p.y + p.h/2 - 6,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 8,
                damage: Math.floor(p.atk * (0.8 + Math.random() * 0.4)),
                life: 120,
                color: '#ffe066'
            };
            game.projectiles.push(proj);
        }

        // ========== PARTICLES ==========
        function spawnParticles(x, y, color, count = 12) {
            for (let i = 0; i < count; i++) {
                const angle = rand(0, Math.PI*2);
                const speed = rand(1, 4);
                game.particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 0.5,
                    radius: rand(2, 6),
                    life: rand(20, 50),
                    maxLife: 50,
                    color: color || '#ffaa44',
                    decay: 0.97
                });
            }
        }

        function addFloatingText(text, x, y, color = '#ffffff', size = 24) {
            game.floatingTexts.push({ text, x, y, vy: -1.5, life: 50, maxLife: 50, color, size });
        }

        // ========== PLAYER ATTACK (click) ==========
        function playerAttack(mx, my) {
            if (game.gameOver || game.win) return;
            if (game.clickCooldown > 0) return;
            // shoot projectile toward click
            shootProjectile(mx, my);
            game.clickCooldown = 12; // frames
            // also melee if enemy near
            const p = game.player;
            const range = 70;
            let hit = false;
            for (let i = game.enemies.length-1; i >= 0; i--) {
                const e = game.enemies[i];
                const dx = (p.x + p.w/2) - (e.x + e.w/2);
                const dy = (p.y + p.h/2) - (e.y + e.h/2);
                if (Math.sqrt(dx*dx + dy*dy) < range) {
                    const dmg = Math.max(1, p.atk - e.def + randInt(-2, 4));
                    e.hp -= dmg;
                    e.hitFlash = 10;
                    spawnParticles(e.x + e.w/2, e.y + e.h/2, '#ff8844', 6);
                    addFloatingText('-' + dmg, e.x, e.y-10, '#ffaa44', 20);
                    if (e.hp <= 0) {
                        // kill enemy
                        game.gold += e.gold || 5;
                        game.player.exp += e.exp || 10;
                        spawnParticles(e.x + e.w/2, e.y + e.h/2, e.color || '#ffaa44', 20);
                        addFloatingText('+' + (e.gold||5) + 'g', e.x, e.y-30, '#ffd966', 18);
                        game.enemies.splice(i, 1);
                        if (e.type === 'boss') {
                            game.bossDefeated = true;
                            game.bossActive = false;
                            game.bossSpawned = false;
                            addFloatingText('🏆 BOSS DEFEATED!', W/2-100, 160, '#ffd700', 40);
                            // reward: +50 gold, +50 exp
                            game.player.gold += 30;
                            game.player.exp += 50;
                        }
                        // check level up
                        checkLevelUp();
                    }
                    hit = true;
                    break;
                }
            }
            if (!hit) {
                // visual feedback for shoot
                spawnParticles(p.x + p.w/2, p.y + p.h/2, '#88ccff', 5);
            }
        }

        // ========== LEVEL UP ==========
        function checkLevelUp() {
            const p = game.player;
            while (p.exp >= p.expNext) {
                p.exp -= p.expNext;
                p.level++;
                p.expNext = Math.floor(p.expNext * 1.4) + 15;
                p.maxHp += 15;
                p.hp = p.maxHp;
                p.baseAtk += 3;
                p.baseDef += 1;
                p.atk = p.baseAtk;
                p.def = p.baseDef;
                addFloatingText('⬆ LEVEL UP! Lv.' + p.level, W/2-80, 200, '#66ff88', 36);
                spawnParticles(W/2, 200, '#66ff88', 30);
                // after level up, if boss not spawned and level multiple of 5, spawn boss
                if (p.level % 5 === 0 && !game.bossSpawned && !game.bossDefeated) {
                    // will spawn on next enemy spawn tick
                }
                updateUI();
            }
        }

        // ========== UPDATE UI ==========
        function updateUI() {
            const p = game.player;
            hpSpan.textContent = Math.floor(p.hp) + '/' + p.maxHp;
            atkSpan.textContent = p.atk;
            defSpan.textContent = p.def;
            goldSpan.textContent = game.gold;
        }

        // ========== GAME LOOP UPDATE ==========
        function update() {
            if (game.gameOver || game.win) return;

            const p = game.player;
            game.frame++;
            if (game.clickCooldown > 0) game.clickCooldown--;

            // enemy spawn
            game.enemySpawnTimer++;
            if (game.enemySpawnTimer >= game.enemySpawnInterval) {
                game.enemySpawnTimer = 0;
                // reduce interval as level increases
                game.enemySpawnInterval = Math.max(30, 70 - game.player.level * 2);
                if (!game.bossActive || game.bossDefeated) {
                    spawnEnemy();
                }
            }

            // ===== update enemies =====
            for (let i = game.enemies.length-1; i >= 0; i--) {
                const e = game.enemies[i];
                if (e.hitFlash > 0) e.hitFlash--;

                // move toward player
                const dx = (p.x + p.w/2) - (e.x + e.w/2);
                const dy = (p.y + p.h/2) - (e.y + e.h/2);
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 50) {
                    const move = Math.min(e.speed, dist);
                    e.x += (dx / dist) * move;
                    e.y += (dy / dist) * move;
                } else {
                    // attack player
                    if (e.attackCooldown <= 0) {
                        const dmg = Math.max(1, e.atk - p.def + randInt(-2, 3));
                        p.hp -= dmg;
                        e.attackCooldown = 40;
                        spawnParticles(p.x + p.w/2, p.y + p.h/2, '#ff3333', 8);
                        addFloatingText('-' + dmg, p.x, p.y-10, '#ff3333', 22);
                        if (p.hp <= 0) {
                            p.hp = 0;
                            game.gameOver = true;
                            addFloatingText('💀 YOU DIED', W/2-80, H/2-20, '#ff0000', 48);
                        }
                        updateUI();
                    }
                }
                if (e.attackCooldown > 0) e.attackCooldown--;

                // boundary clamp
                e.x = Math.max(10, Math.min(W - e.w - 10, e.x));
                e.y = Math.max(30, Math.min(350, e.y));
            }

            // ===== update projectiles =====
            for (let i = game.projectiles.length-1; i >= 0; i--) {
                const proj = game.projectiles[i];
                proj.x += proj.vx;
                proj.y += proj.vy;
                proj.life--;
                // hit enemies
                let hit = false;
                for (let j = game.enemies.length-1; j >= 0; j--) {
                    const e = game.enemies[j];
                    if (proj.x > e.x && proj.x < e.x + e.w && proj.y > e.y && proj.y < e.y + e.h) {
                        const dmg = Math.max(1, proj.damage - e.def + randInt(-2, 4));
                        e.hp -= dmg;
                        e.hitFlash = 8;
                        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#ff8844', 8);
                        addFloatingText('-' + dmg, e.x, e.y-10, '#ffaa44', 20);
                        if (e.hp <= 0) {
                            game.gold += e.gold || 5;
                            game.player.exp += e.exp || 10;
                            spawnParticles(e.x + e.w/2, e.y + e.h/2, e.color || '#ffaa44', 20);
                            addFloatingText('+' + (e.gold||5) + 'g', e.x, e.y-30, '#ffd966', 18);
                            game.enemies.splice(j, 1);
                            if (e.type === 'boss') {
                                game.bossDefeated = true;
                                game.bossActive = false;
                                game.bossSpawned = false;
                                addFloatingText('🏆 BOSS DEFEATED!', W/2-100, 160, '#ffd700', 40);
                                game.player.gold += 30;
                                game.player.exp += 50;
                            }
                            checkLevelUp();
                            updateUI();
                        }
                        hit = true;
                        break;
                    }
                }
                if (hit || proj.life <= 0 || proj.x < 0 || proj.x > W || proj.y < 0 || proj.y > H) {
                    game.projectiles.splice(i, 1);
                }
            }

            // ===== update particles =====
            for (let i = game.particles.length-1; i >= 0; i--) {
                const pt = game.particles[i];
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.vy += 0.05;
                pt.vx *= pt.decay || 0.98;
                pt.vy *= pt.decay || 0.98;
                pt.life--;
                if (pt.life <= 0) {
                    game.particles.splice(i, 1);
                }
            }

            // ===== floating texts =====
            for (let i = game.floatingTexts.length-1; i >= 0; i--) {
                const ft = game.floatingTexts[i];
                ft.y += ft.vy;
                ft.life--;
                if (ft.life <= 0) game.floatingTexts.splice(i, 1);
            }

            // ===== check win condition =====
            if (game.player.level >= 10 && game.bossDefeated) {
                game.win = true;
                addFloatingText('🎉 YOU WIN!', W/2-80, H/2-20, '#ffd700', 48);
            }

            // auto attack nearby enemies (if no click)
            if (game.frame % 30 === 0 && game.enemies.length > 0) {
                // find nearest enemy
                let nearest = null;
                let nearDist = 200;
                for (const e of game.enemies) {
                    const dx = (p.x + p.w/2) - (e.x + e.w/2);
                    const dy = (p.y + p.h/2) - (e.y + e.h/2);
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < nearDist) { nearDist = d; nearest = e; }
                }
                if (nearest) {
                    shootProjectile(nearest.x + nearest.w/2, nearest.y + nearest.h/2);
                }
            }

            updateUI();
        }

        // ========== RENDER ==========
        function render() {
            ctx.clearRect(0, 0, W, H);
            // background
            const grad = ctx.createRadialGradient(450, 300, 100, 450, 300, 500);
            grad.addColorStop(0, '#1e2a4a');
            grad.addColorStop(1, '#0a1020');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // ground line
            ctx.fillStyle = '#2a3a5a';
            ctx.fillRect(0, 430, W, 4);

            // ===== draw enemies =====
            for (const e of game.enemies) {
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 12;
                // body
                ctx.fillStyle = e.hitFlash > 0 ? '#ffffff' : e.color;
                ctx.beginPath();
                ctx.roundRect(e.x, e.y, e.w, e.h, 8);
                ctx.fill();
                // eyes
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(e.x + 8, e.y + 12, 4, 0, Math.PI*2);
                ctx.arc(e.x + e.w - 8, e.y + 12, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(e.x + 6, e.y + 10, 2, 0, Math.PI*2);
                ctx.arc(e.x + e.w - 10, e.y + 10, 2, 0, Math.PI*2);
                ctx.fill();

                // HP bar
                const hpPercent = e.hp / e.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(e.x, e.y - 12, e.w, 6);
                ctx.fillStyle = hpPercent > 0.5 ? '#4caf50' : (hpPercent > 0.25 ? '#ffaa44' : '#f44336');
                ctx.fillRect(e.x, e.y - 12, e.w * hpPercent, 6);

                // boss crown
                if (e.type === 'boss') {
                    ctx.font = '28px sans-serif';
                    ctx.fillStyle = '#ffd700';
                    ctx.fillText('👑', e.x + e.w/2 - 14, e.y - 18);
                }
                ctx.shadowBlur = 0;
            }

            // ===== draw projectiles =====
            for (const proj of game.projectiles) {
                ctx.shadowColor = '#ffe066';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI*2);
                ctx.fillStyle = proj.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // ===== draw player =====
            const p = game.player;
            ctx.shadowColor = 'rgba(100,150,255,0.4)';
            ctx.shadowBlur = 20;
            // body
            ctx.fillStyle = '#4a8af4';
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.w, p.h, 10);
            ctx.fill();
            // head
            ctx.fillStyle = '#f0c8a0';
            ctx.beginPath();
            ctx.arc(p.x + p.w/2, p.y - 6, 18, 0, Math.PI*2);
            ctx.fill();
            // eyes
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(p.x + p.w/2 - 8, p.y - 10, 4, 0, Math.PI*2);
            ctx.arc(p.x + p.w/2 + 8, p.y - 10, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(p.x + p.w/2 - 10, p.y - 12, 2, 0, Math.PI*2);
            ctx.arc(p.x + p.w/2 + 6, p.y - 12, 2, 0, Math.PI*2);
            ctx.fill();
            // hat
            ctx.fillStyle = '#2a4a8a';
            ctx.beginPath();
            ctx.ellipse(p.x + p.w/2, p.y - 22, 20, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // ===== draw particles =====
            for (const pt of game.particles) {
                const alpha = pt.life / pt.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = pt.color;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.radius * alpha, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // ===== floating texts =====
            for (const ft of game.floatingTexts) {
                const alpha = ft.life / ft.maxLife;
                ctx.globalAlpha = alpha;
                ctx.font = `bold ${ft.size}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 12;
                ctx.fillStyle = ft.color;
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1;

            // ===== game over / win overlay =====
            if (game.gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.font = 'bold 56px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff3333';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 30;
                ctx.fillText('GAME OVER', W/2, H/2);
                ctx.shadowBlur = 0;
            }
            if (game.win) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, W, H);
                ctx.font = 'bold 56px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 40;
                ctx.fillText('VICTORY!', W/2, H/2);
                ctx.shadowBlur = 0;
            }

            // FPS / level info
            ctx.font = '14px monospace';
            ctx.fillStyle = '#8899bb';
            ctx.textAlign = 'left';
            ctx.fillText('Lv.' + game.player.level + '  EXP: ' + Math.floor(game.player.exp) + '/' + game.player.expNext, 16, 28);
            ctx.textAlign = 'right';
            ctx.fillText('Enemies: ' + game.enemies.length + ' | Boss: ' + (game.bossActive ? 'Active' : 'Defeated'), W-16, 28);
        }

        // roundRect polyfill for canvas
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (radii || 0);
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        // ========== GAME LOOP ==========
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // ========== EVENT LISTENERS ==========
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            playerAttack(mx, my);
        });

        // touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (touch.clientX - rect.left) * scaleX;
            const my = (touch.clientY - rect.top) * scaleY;
            playerAttack(mx, my);
        }, { passive: false });

        document.getElementById('resetBtn').addEventListener('click', () => {
            // reset game state
            game = {
                player: { x: 400, y: 480, w: 40, h: 50, hp: 100, maxHp: 100, atk: 12, def: 5, baseAtk: 12, baseDef: 5, level: 1, exp: 0, expNext: 30, gold: 0 },
                enemies: [],
                projectiles: [],
                particles: [],
                enemySpawnTimer: 0,
                enemySpawnInterval: 70,
                maxEnemies: 6,
                frame: 0,
                gameOver: false,
                win: false,
                bossActive: false,
                bossSpawned: false,
                bossDefeated: false,
                clickCooldown: 0,
                floatingTexts: []
            };
            updateUI();
            addFloatingText('🔄 Restarted', W/2-60, 200, '#88ccff', 28);
        });

        // ========== START ==========
        updateUI();
        gameLoop();

        // initial spawn
        for (let i = 0; i < 3; i++) {
            setTimeout(() => spawnEnemy(), i * 300);
        }

    })();
</script>
</body>
</html>
