<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anime Battle - Sprite Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #gameContainer {
            background: #111827;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid #2a3a6a;
            max-width: 1000px;
            width: 100%;
        }
        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #c8d8ff;
            padding: 10px 20px;
            background: #1a2540;
            border-radius: 40px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        #topBar .stat {
            background: #0f172a;
            padding: 6px 20px;
            border-radius: 30px;
            border: 1px solid #2f4a7a;
            font-size: 15px;
            font-weight: bold;
        }
        #topBar .stat span { color: #ffd966; }
        #battleCanvas {
            width: 100%;
            height: 400px;
            background: #0a1220;
            border-radius: 24px;
            border: 2px solid #2a3a5a;
            cursor: pointer;
            display: block;
        }
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }
        #controls button {
            background: #2a4a7a;
            border: none;
            color: white;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #0a1a2a;
            flex: 1;
            min-width: 120px;
        }
        #controls button:hover { background: #3a6a9a; transform: translateY(-2px); box-shadow: 0 6px 0 #0a1a2a; }
        #controls button:active { transform: translateY(4px); box-shadow: 0 1px 0 #0a1a2a; }
        #controls button:disabled { opacity: 0.4; transform: translateY(4px); box-shadow: 0 1px 0 #0a1a2a; }
        #controls .info {
            color: #aabbdd;
            font-size: 15px;
            padding: 8px 16px;
            background: #0f172a;
            border-radius: 30px;
            border: 1px solid #2a3a5a;
        }
        #battleLog {
            background: #0a1220;
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 12px;
            max-height: 80px;
            overflow-y: auto;
            color: #88ccff;
            font-size: 14px;
            border: 1px solid #1a2a4a;
        }
        #battleLog::-webkit-scrollbar { width: 4px; }
        #battleLog::-webkit-scrollbar-thumb { background: #2a4a7a; border-radius: 10px; }
        .floatText {
            position: fixed;
            font-weight: bold;
            font-size: 32px;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 1.2s forwards;
            z-index: 1000;
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <div id="topBar">
        <div class="stat">⚔️ <span id="atkDisplay">15</span></div>
        <div class="stat">🛡️ <span id="defDisplay">8</span></div>
        <div class="stat">❤️ <span id="hpDisplay">100/100</span></div>
        <div class="stat">🏆 <span id="winDisplay">0</span></div>
    </div>
    <canvas id="battleCanvas" width="900" height="400"></canvas>
    <div id="controls">
        <button id="attackBtn">⚡ Tấn công</button>
        <button id="specialBtn">🔥 Chiêu đặc biệt</button>
        <button id="resetBtn">🔄 Hồi sinh</button>
        <span class="info" id="statusDisplay">🟢 Sẵn sàng</span>
    </div>
    <div id="battleLog">⚔️ Chào mừng! Hãy tấn công để bắt đầu.</div>
</div>

<script>
    // ============================================================
    //  ANIME SPRITE CLASS - vẽ nhân vật 2D với animation
    // ============================================================
    class AnimeSprite {
        constructor(x, y, name, color, isPlayer = true) {
            this.x = x;
            this.y = y;
            this.name = name;
            this.color = color;
            this.isPlayer = isPlayer;
            this.width = 80;
            this.height = 120;

            // Stats
            this.hp = 100;
            this.maxHp = 100;
            this.atk = 15;
            this.def = 8;

            // Animation state
            this.state = 'idle'; // idle | attack | hit | die | special
            this.frame = 0;
            this.frameCount = 0;
            this.animSpeed = 6;
            this.animTimer = 0;

            // Visual effects
            this.flash = 0;
            this.scale = 1;
            this.rotation = 0;
            this.shakeX = 0;
            this.shakeY = 0;
            this.attackSwing = 0;
            this.specialGlow = 0;

            // Hit effects
            this.hitParticles = [];
        }

        // ----- Vẽ nhân vật theo trạng thái -----
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.scale, this.scale);
            ctx.rotate(this.rotation);

            // Shake effect
            if (this.shakeX !== 0 || this.shakeY !== 0) {
                ctx.translate(this.shakeX, this.shakeY);
            }

            // Flash effect (nhấp nháy khi bị đánh)
            if (this.flash > 0 && Math.floor(this.flash / 3) % 2 === 0) {
                ctx.globalAlpha = 0.6;
            }

            // === Vẽ body ===
            const cx = 0, cy = 0; // center

            // Shadow
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 20;

            // === Thân (áo) ===
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.isPlayer ? 'rgba(70,130,255,0.3)' : 'rgba(255,70,70,0.3)';

            // Body shape
            ctx.beginPath();
            ctx.ellipse(cx, cy + 10, 30, 40, 0, 0, Math.PI * 2);
            ctx.fillStyle = this.isPlayer ? '#2a5a9a' : '#6a2a2a';
            ctx.fill();
            ctx.strokeStyle = this.isPlayer ? '#4a8aee' : '#aa4a4a';
            ctx.lineWidth = 2;
            ctx.stroke();

            // === Áo choàng / chi tiết ===
            ctx.beginPath();
            ctx.ellipse(cx - 10, cy + 20, 12, 20, -0.2, 0, Math.PI * 2);
            ctx.fillStyle = this.isPlayer ? '#1a4a7a' : '#5a1a1a';
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(cx + 10, cy + 20, 12, 20, 0.2, 0, Math.PI * 2);
            ctx.fillStyle = this.isPlayer ? '#1a4a7a' : '#5a1a1a';
            ctx.fill();

            // === Đầu ===
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(255,200,150,0.2)';
            // Face
            ctx.beginPath();
            ctx.ellipse(cx, cy - 20, 22, 26, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#f0c8a0';
            ctx.fill();
            ctx.strokeStyle = '#d4a080';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // === Tóc (Anime style) ===
            ctx.shadowBlur = 0;
            // Tóc mái
            ctx.fillStyle = this.isPlayer ? '#1a1a3a' : '#2a1a1a';
            ctx.beginPath();
            ctx.ellipse(cx - 12, cy - 30, 14, 10, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 12, cy - 30, 14, 10, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx, cy - 36, 18, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Tóc sau (dài)
            ctx.fillStyle = this.isPlayer ? '#1a1a4a' : '#2a1a1a';
            for (let i = -3; i <= 3; i++) {
                ctx.beginPath();
                ctx.ellipse(cx + i * 8, cy + 10 + Math.abs(i) * 4, 6, 16 + Math.abs(i) * 3, 0.1 * i, 0, Math.PI * 2);
                ctx.fill();
            }

            // === Mắt ===
            ctx.shadowBlur = 0;
            // Mắt trái
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(cx - 10, cy - 22, 8, 9, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2a2a4a';
            ctx.beginPath();
            ctx.arc(cx - 8, cy - 20, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cx - 10, cy - 23, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // Mắt phải
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(cx + 10, cy - 22, 8, 9, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2a2a4a';
            ctx.beginPath();
            ctx.arc(cx + 12, cy - 20, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(cx + 10, cy - 23, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // === Miệng ===
            ctx.strokeStyle = '#8a5a4a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (this.state === 'hit' || this.state === 'die') {
                ctx.arc(cx, cy - 8, 8, 0, Math.PI);
            } else if (this.state === 'attack' || this.state === 'special') {
                ctx.arc(cx, cy - 10, 8, 0.1, Math.PI - 0.1);
            } else {
                ctx.arc(cx, cy - 10, 6, 0.2, Math.PI - 0.2);
            }
            ctx.stroke();

            // === Vũ khí / Tay ===
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(255,200,100,0.3)';
            // Tay trái
            ctx.fillStyle = '#f0c8a0';
            ctx.beginPath();
            ctx.ellipse(cx - 28, cy + 4, 8, 14, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // Tay phải (cầm vũ khí)
            const armAngle = this.state === 'attack' ? -1.5 + this.attackSwing * 2 : 
                             this.state === 'special' ? -2.0 : -0.3;
            ctx.fillStyle = '#f0c8a0';
            ctx.beginPath();
            ctx.ellipse(cx + 28, cy + 4, 8, 14, armAngle, 0, Math.PI * 2);
            ctx.fill();

            // === Vũ khí (Kiếm / Gậy) ===
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.state === 'special' ? '#ffaa44' : '#88ccff';

            const weaponLen = this.state === 'attack' ? 60 + this.attackSwing * 20 : 50;
            const weaponAngle = this.state === 'attack' ? -1.2 + this.attackSwing * 2.5 :
                                this.state === 'special' ? -2.5 : -0.2;

            ctx.save();
            ctx.translate(cx + 30, cy - 4);
            ctx.rotate(weaponAngle);

            // Lưỡi kiếm
            ctx.fillStyle = this.state === 'special' ? '#ffaa44' : '#c8d8ff';
            ctx.shadowColor = this.state === 'special' ? '#ff8800' : '#4488ff';
            ctx.beginPath();
            ctx.moveTo(0, -4);
            ctx.lineTo(weaponLen, -2);
            ctx.lineTo(weaponLen + 8, 0);
            ctx.lineTo(weaponLen, 2);
            ctx.lineTo(0, 4);
            ctx.closePath();
            ctx.fill();

            // Chuôi kiếm
            ctx.fillStyle = '#8a6a4a';
            ctx.shadowBlur = 5;
            ctx.fillRect(-6, -3, 8, 6);

            // Bảo vệ tay
            ctx.fillStyle = '#c8a050';
            ctx.beginPath();
            ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // === Hiệu ứng đặc biệt (Special) ===
            if (this.state === 'special' && this.specialGlow > 0) {
                ctx.shadowBlur = 60;
                ctx.shadowColor = `rgba(255,170,68,${this.specialGlow / 20})`;
                ctx.beginPath();
                ctx.arc(cx, cy, 50 + (20 - this.specialGlow) * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,200,100,${this.specialGlow / 40})`;
                ctx.fill();
            }

            // === Hạt (particles) khi bị đánh ===
            for (const p of this.hitParticles) {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x - this.x, p.y - this.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            ctx.restore();

            // === Thanh HP ===
            this.drawHP(ctx);
        }

        drawHP(ctx) {
            const hpPct = this.hp / this.maxHp;
            const barX = this.x - 40;
            const barY = this.y - 80;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(barX - 2, barY - 2, 84, 16);
            ctx.fillStyle = hpPct > 0.5 ? '#4caf50' : (hpPct > 0.25 ? '#ffaa44' : '#f44336');
            ctx.fillRect(barX, barY, 80 * hpPct, 12);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.strokeRect(barX, barY, 80, 12);
            ctx.fillStyle = '#fff';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`${Math.floor(this.hp)}/${this.maxHp}`, this.x, barY + 10);
            // Tên
            ctx.fillStyle = '#ffd966';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(this.name, this.x, barY - 8);
        }

        // ----- Cập nhật animation -----
        update() {
            this.animTimer++;

            // Giảm flash
            if (this.flash > 0) this.flash--;

            // Giảm special glow
            if (this.specialGlow > 0) this.specialGlow--;

            // Cập nhật particles
            for (let i = this.hitParticles.length - 1; i >= 0; i--) {
                const p = this.hitParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life--;
                if (p.life <= 0) this.hitParticles.splice(i, 1);
            }

            // Animation theo trạng thái
            switch (this.state) {
                case 'idle':
                    this.scale = 1 + Math.sin(this.animTimer * 0.04) * 0.02;
                    this.rotation = Math.sin(this.animTimer * 0.03) * 0.01;
                    this.attackSwing = 0;
                    break;
                case 'attack':
                    this.frameCount++;
                    this.attackSwing = Math.sin(this.frameCount * 0.3);
                    if (this.frameCount > 20) {
                        this.state = 'idle';
                        this.frameCount = 0;
                        this.attackSwing = 0;
                    }
                    this.scale = 1 + Math.sin(this.frameCount * 0.2) * 0.05;
                    break;
                case 'hit':
                    this.shakeX = (Math.random() - 0.5) * 8;
                    this.shakeY = (Math.random() - 0.5) * 8;
                    this.frameCount++;
                    if (this.frameCount > 15) {
                        this.state = 'idle';
                        this.frameCount = 0;
                        this.shakeX = 0;
                        this.shakeY = 0;
                    }
                    break;
                case 'special':
                    this.frameCount++;
                    this.specialGlow = 30;
                    this.attackSwing = Math.sin(this.frameCount * 0.2) * 0.8;
                    if (this.frameCount > 35) {
                        this.state = 'idle';
                        this.frameCount = 0;
                        this.attackSwing = 0;
                    }
                    break;
                case 'die':
                    this.scale *= 0.98;
                    this.rotation += 0.02;
                    this.y += 0.5;
                    if (this.scale < 0.1) this.scale = 0.1;
                    break;
            }
        }

        // ----- Hành động -----
        attack() {
            if (this.state === 'die') return;
            this.state = 'attack';
            this.frameCount = 0;
            // Tạo hiệu ứng vệt kiếm
            this.hitParticles.push({
                x: this.x + 50,
                y: this.y - 10,
                vx: 2 + Math.random() * 3,
                vy: -1 + Math.random() * 2,
                size: 4 + Math.random() * 6,
                life: 20,
                maxLife: 20,
                color: '#88ddff'
            });
        }

        special() {
            if (this.state === 'die') return;
            this.state = 'special';
            this.frameCount = 0;
            for (let i = 0; i < 30; i++) {
                this.hitParticles.push({
                    x: this.x + (Math.random() - 0.5) * 80,
                    y: this.y + (Math.random() - 0.5) * 80,
                    vx: (Math.random() - 0.5) * 6,
                    vy: -2 - Math.random() * 4,
                    size: 3 + Math.random() * 8,
                    life: 25 + Math.random() * 20,
                    maxLife: 45,
                    color: ['#ff8844', '#ffcc44', '#ff4444'][Math.floor(Math.random() * 3)]
                });
            }
        }

        takeDamage(dmg) {
            if (this.state === 'die') return;
            this.hp -= dmg;
            this.flash = 20;
            this.state = 'hit';
            this.frameCount = 0;
            // Tạo particles máu
            for (let i = 0; i < 15; i++) {
                this.hitParticles.push({
                    x: this.x + (Math.random() - 0.5) * 40,
                    y: this.y + (Math.random() - 0.5) * 40,
                    vx: (Math.random() - 0.5) * 8,
                    vy: -2 - Math.random() * 5,
                    size: 2 + Math.random() * 5,
                    life: 15 + Math.random() * 15,
                    maxLife: 30,
                    color: '#ff3333'
                });
            }
            if (this.hp <= 0) {
                this.hp = 0;
                this.state = 'die';
                this.flash = 0;
                this.scale = 1;
            }
        }

        heal(amount) {
            this.hp = Math.min(this.maxHp, this.hp + amount);
            if (this.state === 'die') {
                this.state = 'idle';
                this.scale = 1;
                this.rotation = 0;
                this.y = this.isPlayer ? 240 : 240;
            }
        }
    }

    // ============================================================
    //  GAME ENGINE
    // ============================================================
    const canvas = document.getElementById('battleCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 400;

    // UI elements
    const atkSpan = document.getElementById('atkDisplay');
    const defSpan = document.getElementById('defDisplay');
    const hpSpan = document.getElementById('hpDisplay');
    const winSpan = document.getElementById('winDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const logDiv = document.getElementById('battleLog');

    // Game state
    let player, enemy;
    let wins = 0;
    let battleLog = [];
    let isAnimating = false;
    let animFrameId = null;

    // ============================================================
    //  KHỞI TẠO NHÂN VẬT
    // ============================================================
    function initGame() {
        player = new AnimeSprite(200, 240, 'Kirito', '#2a5a9a', true);
        player.atk = 15;
        player.def = 8;
        player.hp = 100;
        player.maxHp = 100;

        enemy = new AnimeSprite(680, 240, 'Boss', '#6a2a2a', false);
        enemy.atk = 12;
        enemy.def = 5;
        enemy.hp = 120;
        enemy.maxHp = 120;

        wins = 0;
        battleLog = [];
        isAnimating = false;
        updateUI();
        log('⚔️ Trận đấu bắt đầu! Hãy tấn công.');
        statusDisplay.textContent = '🟢 Sẵn sàng';
    }

    // ============================================================
    //  CHIẾN ĐẤU
    // ============================================================
    function playerAttack() {
        if (isAnimating) return;
        if (player.state === 'die') {
            log('❌ Bạn đã chết! Hãy hồi sinh.');
            return;
        }
        if (enemy.state === 'die') {
            log('❌ Kẻ thù đã chết! Hãy reset.');
            return;
        }

        isAnimating = true;
        statusDisplay.textContent = '⚔️ Đang tấn công...';
        document.querySelectorAll('#controls button').forEach(b => b.disabled = true);

        // Player attack animation
        player.attack();

        // Tính sát thương
        const dmg = Math.max(1, player.atk - enemy.def + Math.floor(Math.random() * 6) - 2);
        log(`⚔️ ${player.name} gây ${dmg} sát thương!`);

        // Enemy nhận damage sau 400ms
        setTimeout(() => {
            enemy.takeDamage(dmg);
            addFloatingText(`-${dmg}`, enemy.x - 30, enemy.y - 100, '#ff4444');

            if (enemy.hp <= 0) {
                log(`🏆 ${enemy.name} đã bị đánh bại!`);
                wins++;
                statusDisplay.textContent = '🏆 Chiến thắng!';
                addFloatingText('💀 K.O.!', enemy.x - 40, enemy.y - 150, '#ff8844');
                // Reset enemy after 1.5s
                setTimeout(() => {
                    resetEnemy();
                    isAnimating = false;
                    document.querySelectorAll('#controls button').forEach(b => b.disabled = false);
                    statusDisplay.textContent = '🟢 Sẵn sàng';
                    updateUI();
                }, 1500);
                updateUI();
                return;
            }

            // Enemy counter-attack
            setTimeout(() => {
                enemyAttack();
            }, 500);

        }, 400);
    }

    function enemyAttack() {
        if (enemy.state === 'die' || player.state === 'die') {
            isAnimating = false;
            document.querySelectorAll('#controls button').forEach(b => b.disabled = false);
            return;
        }

        // Enemy attack animation
        enemy.attack();

        const dmg = Math.max(1, enemy.atk - player.def + Math.floor(Math.random() * 5) - 2);
        log(`💢 ${enemy.name} gây ${dmg} sát thương!`);

        setTimeout(() => {
            player.takeDamage(dmg);
            addFloatingText(`-${dmg}`, player.x - 30, player.y - 100, '#ff8844');

            if (player.hp <= 0) {
                log('💀 Bạn đã thua!');
                statusDisplay.textContent = '💀 Thất bại...';
                addFloatingText('💀 DEFEAT', 400, 150, '#ff3333');
            }

            isAnimating = false;
            document.querySelectorAll('#controls button').forEach(b => b.disabled = false);
            statusDisplay.textContent = player.hp > 0 ? '🟢 Sẵn sàng' : '💀 Đã chết';
            updateUI();
        }, 400);
    }

    function playerSpecial() {
        if (isAnimating) return;
        if (player.state === 'die') {
            log('❌ Bạn đã chết!');
            return;
        }
        if (enemy.state === 'die') {
            log('❌ Kẻ thù đã chết!');
            return;
        }

        isAnimating = true;
        statusDisplay.textContent = '🔥 Đang dùng chiêu đặc biệt...';
        document.querySelectorAll('#controls button').forEach(b => b.disabled = true);

        player.special();
        log(`🔥 ${player.name} dùng CHIÊU ĐẶC BIỆT!`);

        const dmg = Math.max(1, Math.floor(player.atk * 2.2) - enemy.def + Math.floor(Math.random() * 8));
        log(`💥 Gây ${dmg} sát thương khủng!`);

        setTimeout(() => {
            enemy.takeDamage(dmg);
            addFloatingText(`💥 ${dmg}`, enemy.x - 30, enemy.y - 120, '#ffaa00');

            if (enemy.hp <= 0) {
                log(`🏆 ${enemy.name} đã bị đánh bại!`);
                wins++;
                statusDisplay.textContent = '🏆 Chiến thắng!';
                addFloatingText('💀 K.O.!', enemy.x - 40, enemy.y - 150, '#ff8844');
                setTimeout(() => {
                    resetEnemy();
                    isAnimating = false;
                    document.querySelectorAll('#controls button').forEach(b => b.disabled = false);
                    statusDisplay.textContent = '🟢 Sẵn sàng';
                    updateUI();
                }, 1500);
                updateUI();
                return;
            }

            // Enemy counter
            setTimeout(() => {
                enemyAttack();
            }, 500);

        }, 600);
    }

    function resetEnemy() {
        enemy = new AnimeSprite(680, 240, 'Boss', '#6a2a2a', false);
        enemy.atk = 12 + Math.floor(wins * 1.2);
        enemy.def = 5 + Math.floor(wins * 0.6);
        enemy.hp = 120 + wins * 15;
        enemy.maxHp = enemy.hp;
        log(`🔄 ${enemy.name} hồi sinh với ${enemy.hp} HP!`);
        updateUI();
    }

    function resetAll() {
        if (animFrameId) cancelAnimationFrame(animFrameId);
        initGame();
        updateUI();
        log('🔄 Đã hồi sinh tất cả!');
        statusDisplay.textContent = '🟢 Sẵn sàng';
        document.querySelectorAll('#controls button').forEach(b => b.disabled = false);
        isAnimating = false;
    }

    // ============================================================
    //  RENDER LOOP
    // ============================================================
    function render() {
        ctx.clearRect(0, 0, W, H);

        // Background
        const grad = ctx.createRadialGradient(450, 200, 100, 450, 200, 500);
        grad.addColorStop(0, '#1a2a4a');
        grad.addColorStop(0.5, '#0a1520');
        grad.addColorStop(1, '#050a10');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Ground
        ctx.fillStyle = '#1a2a3a';
        ctx.fillRect(0, 340, W, 4);
        ctx.shadowBlur = 0;

        // Grid effect
        ctx.strokeStyle = 'rgba(40,80,120,0.1)';
        ctx.lineWidth = 1;
        for (let i = 0; i < W; i += 40) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, H);
            ctx.stroke();
        }
        for (let i = 0; i < H; i += 40) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(W, i);
            ctx.stroke();
        }

        // VS text
        ctx.font = 'bold 48px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,200,100,0.15)';
        ctx.fillText('⚔️ VS ⚔️', 450, 180);

        // Update & draw player
        player.update();
        player.draw(ctx);

        // Update & draw enemy
        enemy.update();
        enemy.draw(ctx);

        // Status text
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#8899bb';
        ctx.fillText(`${player.name} (Bạn)`, 200, 360);
        ctx.fillText(`${enemy.name} (Kẻ thù)`, 680, 360);

        animFrameId = requestAnimationFrame(render);
    }

    // ============================================================
    //  UI UPDATE
    // ============================================================
    function updateUI() {
        atkSpan.textContent = player.atk;
        defSpan.textContent = player.def;
        hpSpan.textContent = `${Math.floor(player.hp)}/${player.maxHp}`;
        winSpan.textContent = wins;
    }

    function log(msg) {
        battleLog.push('⚔️ ' + msg);
        if (battleLog.length > 20) battleLog.shift();
        logDiv.innerHTML = battleLog.slice(-8).join('<br>');
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // ============================================================
    //  FLOATING TEXT
    // ============================================================
    function addFloatingText(text, x, y, color = '#ffd700') {
        const el = document.createElement('div');
        el.className = 'floatText';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1300);
    }

    // ============================================================
    //  EVENT LISTENERS
    // ============================================================
    document.getElementById('attackBtn').addEventListener('click', playerAttack);
    document.getElementById('specialBtn').addEventListener('click', playerSpecial);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    // Click canvas cũng kích hoạt tấn công
    canvas.addEventListener('click', playerAttack);

    // ============================================================
    //  START
    // ============================================================
    initGame();
    render();

    console.log('🎮 Anime Battle Sprite loaded!');
    console.log('👤 Player:', player);
    console.log('👾 Enemy:', enemy);
</script>
</body>
</html>
